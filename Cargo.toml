[workspace]
members = [
    "RNG-CONCRETE",
]
resolver = "2"

[workspace.package]
version = "0.1.0"
edition = "2024"
authors = ["Kei Thoma"]
license = "MIT"
repository = "https://github.com/user/CONCRETE"

[workspace.lints.rust]
unsafe_code = "forbid"
missing_docs = "warn"
clippy = { group = "pedantic", level = "warn" }